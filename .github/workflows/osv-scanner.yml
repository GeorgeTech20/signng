name: osv-scanner
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    # Lockfile-aware SCA (security LAYER 4 / OWASP A06). Fails the PR on known-vuln deps.
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v1.9.2
    with:
      scan-args: |-
        --lockfile=./pnpm-lock.yaml
