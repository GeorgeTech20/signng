name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read # least privilege (OpenSSF Scorecard: Token-Permissions)

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # NOTE: pin every action to a commit SHA in production (Scorecard: Pinned-Dependencies).
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      # Full gate: core build + unit + tokens + signed registry + security lint + fail-closed + a11y.
      - run: pnpm verify:all
